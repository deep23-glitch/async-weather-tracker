<!DOCTYPE html>
<html>
<head>
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌤 Async Weather Tracker</h1>

<div class="container">

<div class="left">
    
<div class="card">
<h3>Search City</h3>

<input type="text" id="cityInput" placeholder="Delhi, London">
<button onclick="getWeather()">Search</button>

</div>

<div class="card">
<h3>Search History</h3>
<div id="history"></div>
</div>

</div>


<div class="right">

<div class="card">
<h3>Weather Info</h3>
<div id="weather"></div>
</div>

</div>

</div>


<div class="consoleBox">
<h3>Console – Event Loop</h3>
<div id="console"></div>
</div>


<script src="script.js"></script>

</body>
</html>
